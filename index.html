<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Kareem Shanghai — 19 June shoot plan</title>
<style>
  :root {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --panel-soft: #fafafb;
    --panel-tint: #f0f0f3;
    --ink: #1d1d1f;
    --ink-2: #424245;
    --ink-3: #6e6e73;
    --ink-4: #86868b;
    --ink-5: #a1a1a6;
    --line: #e5e5ea;
    --line-soft: #ececef;
    --line-strong: #d2d2d7;
    --imp: #0071e3;  --imp-tint: #e3eeff;
    --sidebar-w: 244px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: #ffe066; }

  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

  aside.sidebar {
    background: var(--panel); border-right: 1px solid var(--line);
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column; padding: 22px 18px 18px;
  }
  @media (max-width: 880px) {
    aside.sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 16px 18px; }
  }
  .brand { padding: 0 6px 18px; border-bottom: 1px solid var(--line-soft); margin-bottom: 18px; }
  .brand small { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin-bottom: 4px; }
  .brand strong { display: block; font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
  .nav-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; padding: 0 6px 8px; }
  nav.toc { display: flex; flex-direction: column; gap: 1px; }
  nav.toc a { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; color: var(--ink-3); text-decoration: none; font-size: 13px; transition: background .12s ease, color .12s ease; line-height: 1.3; }
  nav.toc a:hover { background: var(--panel-tint); color: var(--ink); }
  nav.toc a.active { background: var(--imp-tint); color: var(--imp); }
  nav.toc a.active .num { color: var(--imp); }
  nav.toc a .num { font-size: 11px; color: var(--ink-5); font-variant-numeric: tabular-nums; font-weight: 600; width: 18px; flex-shrink: 0; }
  .sidebar-foot { margin-top: auto; padding: 14px 6px 0; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--ink-5); line-height: 1.5; }

  main.main { padding: 32px 56px 80px; max-width: 1100px; width: 100%; }
  @media (max-width: 720px) { main.main { padding: 24px 20px 64px; } }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; margin-bottom: 24px; border-bottom: 1px solid var(--line); font-size: 12px; color: var(--ink-4); }
  .topbar .crumbs span { color: var(--ink-3); }
  .topbar .crumbs span + span::before { content: " / "; color: var(--ink-5); }
  .meta-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 3px 8px; font-size: 11px; color: var(--ink-3); }
  .meta-pill b { color: var(--ink); font-weight: 600; }

  .hero { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 28px 32px; margin-bottom: 24px; box-shadow: var(--shadow); }
  .hero h1 { font-size: 30px; line-height: 1.15; letter-spacing: -0.02em; font-weight: 600; margin: 0 0 8px; }
  .hero p.lede { font-size: 14.5px; color: var(--ink-3); margin: 0 0 20px; max-width: 700px; }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 12px 14px; }
  .stat b { display: block; font-size: 21px; font-weight: 600; color: var(--ink); line-height: 1.1; letter-spacing: -0.015em; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
  .stat span { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

  section.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 24px 28px 28px; margin-bottom: 18px; box-shadow: var(--shadow); scroll-margin-top: 16px; }
  .panel-head { display: flex; align-items: baseline; gap: 14px; padding-bottom: 14px; margin-bottom: 18px; border-bottom: 1px solid var(--line-soft); }
  .panel-head .badge { font-size: 10.5px; color: var(--ink-5); background: var(--panel-tint); padding: 3px 7px; border-radius: 4px; font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: 0.04em; }
  .panel-head h2 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.01em; flex: 1; }
  .panel-head .head-meta { font-size: 11.5px; color: var(--ink-4); }
  .panel-sub { color: var(--ink-3); margin: 0 0 20px; font-size: 13.5px; max-width: 780px; }

  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 1000px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* framing split */
  .framing { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 760px) { .framing { grid-template-columns: 1fr; } }
  .frame { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 20px 22px; }
  .frame .lbl { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-4); font-weight: 600; margin-bottom: 8px; }
  .frame p { margin: 0; font-size: 13.5px; color: var(--ink-2); line-height: 1.55; }
  .frame p .who { color: var(--ink-4); }

  /* flow */
  .flow { display: flex; flex-wrap: wrap; gap: 8px; }
  .flow .step { flex: 1 1 0; min-width: 130px; background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .flow .step .n { font-size: 10px; font-weight: 600; color: var(--ink-5); letter-spacing: 0.08em; font-variant-numeric: tabular-nums; }
  .flow .step .t { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
  .flow .step .d { font-size: 11.5px; color: var(--ink-3); line-height: 1.45; }

  /* matrix table */
  .matrix { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; overflow: hidden; }
  .matrix table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix th, .matrix td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  .matrix tbody tr:last-child td { border-bottom: 0; }
  .matrix tbody tr:hover td { background: rgba(0,0,0,0.015); }
  .matrix th { font-weight: 500; color: var(--ink-4); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; background: var(--panel-tint); }
  .matrix td.time { font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 600; white-space: nowrap; }
  .matrix td.label { font-weight: 600; color: var(--ink); }
  .matrix td.note { color: var(--ink-3); font-size: 12.5px; }
  .matrix td.beat { color: var(--ink-3); font-size: 12.5px; }
  .keydep { display: block; margin-top: 4px; font-style: italic; color: var(--ink-4); font-size: 11.5px; }

  /* clean list */
  .clist { margin: 0; padding: 0; list-style: none; }
  .clist li { padding: 10px 0; border-top: 1px solid var(--line-soft); font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  .clist li:first-child { border-top: 0; }
  .clist li strong { color: var(--ink); font-weight: 600; }
  .clist li .pre { color: var(--ink-4); font-weight: 600; margin-right: 4px; }

  /* message cards */
  .mcard { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 14px 16px; display: flex; flex-direction: column; gap: 7px; min-height: 110px; }
  .mcard .row { display: flex; align-items: center; gap: 8px; }
  .mcard .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--imp); flex-shrink: 0; }
  .mcard .lead { font-size: 13.5px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
  .mcard p { margin: 0; font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }

  .prose { font-size: 13.5px; color: var(--ink-2); line-height: 1.6; margin: 0; max-width: 800px; }
  .prose strong { color: var(--ink); font-weight: 600; }

  footer.foot { border-top: 1px solid var(--line); margin-top: 40px; padding-top: 20px; color: var(--ink-4); font-size: 12px; line-height: 1.7; }

  /* gate */
  #gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 1000; padding: 20px; }
  #gate-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 26px 28px; width: 320px; box-shadow: var(--shadow); }
  #gate-card .eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin-bottom: 4px; }
  #gate-card h2 { font-size: 16px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  #gate-card p.sub { font-size: 12.5px; color: var(--ink-4); margin: 0 0 16px; }
  #gate-form { display: flex; gap: 8px; }
  #gate-input { flex: 1; padding: 9px 11px; border: 1px solid var(--line-strong); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--ink); }
  #gate-input:focus { outline: none; border-color: var(--imp); }
  #gate-btn { padding: 9px 16px; border: 0; border-radius: 6px; background: var(--ink); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  #gate-btn:hover { background: #000; }
  #gate-err { font-size: 12px; color: #c0392b; margin-top: 10px; min-height: 14px; }
  body.locked { overflow: hidden; }
</style>
</head>
<body class="locked">
<div id="gate">
  <div id="gate-card">
    <div class="eyebrow">WorldFirst &middot; internal</div>
    <h2>Kareem &middot; Shanghai shoot</h2>
    <p class="sub">Enter the team password.</p>
    <form id="gate-form" onsubmit="return gateSubmit(event)">
      <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
      <button id="gate-btn" type="submit">Enter</button>
    </form>
    <div id="gate-err"></div>
  </div>
</div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(password,salt,iterations){const enc=new TextEncoder();const base=await crypto.subtle.importKey("raw",enc.encode(password),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(password){const blob=JSON.parse(document.getElementById('payload').textContent);const salt=b64ToBytes(blob.salt);const iv=b64ToBytes(blob.iv);const ct=b64ToBytes(blob.ciphertext);const key=await deriveKey(password,salt,blob.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);return new TextDecoder().decode(plain);}
function initScrollspy(){const links=[...document.querySelectorAll('nav.toc a')];const map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.remove('active'));const a=map.get(e.target.id);if(a)a.classList.add('active');}});},{rootMargin:'-15% 0px -75% 0px',threshold:0});document.querySelectorAll('section.panel').forEach(s=>obs.observe(s));}
function reveal(html){const c=document.getElementById('content');c.innerHTML=html;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initScrollspy();}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const html=await decryptPayload(inp.value);reveal(html);try{localStorage.setItem('kareem_shoot_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const cached=localStorage.getItem('kareem_shoot_pw');if(cached){const html=await decryptPayload(cached);reveal(html);}}catch(_){try{localStorage.removeItem('kareem_shoot_pw');}catch(_){}}})();
</script>
